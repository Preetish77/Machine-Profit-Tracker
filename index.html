
<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Machine Tracker</title>

<style>

body{
font-family:Arial;
margin:0;
background:#f4f6f9;
}

.header{
background:#1e88e5;
color:white;
padding:16px;
text-align:center;
font-size:22px;
font-weight:bold;
}

.tabs{
display:flex;
background:#e0e0e0;
}

.tabs button{
flex:1;
padding:14px;
border:none;
background:#e0e0e0;
font-size:16px;
font-weight:bold;
}

.tabs button.active{
background:white;
border-bottom:3px solid #1e88e5;
}

.container{
padding:15px;
max-width:900px;
margin:auto;
}

input{
width:100%;
padding:12px;
margin:6px 0;
border:1px solid #ccc;
border-radius:6px;
font-size:16px;
}

button.save{
background:#1e88e5;
color:white;
padding:12px;
border:none;
width:100%;
margin-top:10px;
border-radius:6px;
font-size:16px;
}

table{
width:100%;
border-collapse:collapse;
margin-top:20px;
background:white;
}

th,td{
padding:10px;
border:1px solid #ddd;
text-align:center;
}

th{
background:#1e88e5;
color:white;
}

.editBtn{
background:#ff9800;
color:white;
border:none;
padding:6px 10px;
border-radius:4px;
}

/* MOBILE */

@media(max-width:600px){

table,thead,tbody,tr,td,th{
display:block;
}

thead{
display:none;
}

tr{
background:white;
margin-bottom:12px;
border-radius:8px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
padding:10px;
}

td{
border:none;
text-align:left;
padding:6px 0;
}

}

</style>
</head>

<body>

<div class="header">Machine Tracker</div>

<div class="tabs">
<button class="active" onclick="showTab('kobelco')">Kobelco</button>
<button onclick="showTab('compressor')">Compressor</button>
</div>

<div class="container">

<div id="kobelcoTab">

<h3>Kobelco Excavator</h3>

<input type="date" id="exDate">
<input type="number" id="exHours" placeholder="Hours">
<input type="number" id="exDiesel" placeholder="Diesel">
<input type="number" id="exExpense" placeholder="Expense">
<input type="text" id="exNotes" placeholder="Notes">

<button class="save" onclick="saveKobelco()">Save</button>

<table id="kobelcoTable">

<tr>
<th>Date</th>
<th>Hours</th>
<th>Diesel</th>
<th>Expense</th>
<th>Notes</th>
<th>Edit</th>
</tr>

</table>

</div>

<div id="compressorTab" style="display:none">

<h3>Compressor Drilling</h3>

<input type="date" id="coDate">
<input type="number" id="coHoles" placeholder="Holes">
<input type="number" id="coDiesel" placeholder="Diesel">
<input type="number" id="coExpense" placeholder="Expense">
<input type="text" id="coNotes" placeholder="Notes">

<button class="save" onclick="saveCompressor()">Save</button>

<table id="compressorTable">

<tr>
<th>Date</th>
<th>Holes</th>
<th>Feet</th>
<th>Diesel</th>
<th>Expense</th>
<th>Notes</th>
<th>Edit</th>
</tr>

</table>

</div>

</div>

<script>

const API="https://script.google.com/macros/s/AKfycbwESBFCxpUXAMWoyeuhW7zUJMPJ1q-wt3uoiXr56Notxxo4dSrfxpLRAOFKSjBwGoz3/exec"
const FEET_PER_HOLE=6
let editRow=null

function showTab(tab){

document.getElementById("kobelcoTab").style.display="none"
document.getElementById("compressorTab").style.display="none"

document.querySelectorAll(".tabs button").forEach(b=>b.classList.remove("active"))

if(tab==="kobelco"){
document.getElementById("kobelcoTab").style.display="block"
document.querySelectorAll(".tabs button")[0].classList.add("active")
}

if(tab==="compressor"){
document.getElementById("compressorTab").style.display="block"
document.querySelectorAll(".tabs button")[1].classList.add("active")
}

}

function loadData(){

fetch(API)
.then(r=>r.json())
.then(data=>{

data.forEach((row,i)=>{

if(i===0)return

let machine=row[0]
let date=row[1]
let hours=row[2]||""
let holes=row[3]||""
let feet=row[4]||""
let diesel=row[5]||""
let expense=row[6]||""
let notes=row[7]||""

if(machine==="kobelco"){

let t=document.getElementById("kobelcoTable")
let r=t.insertRow()

r.insertCell(0).innerText=date
r.insertCell(1).innerText=hours
r.insertCell(2).innerText=diesel
r.insertCell(3).innerText=expense
r.insertCell(4).innerText=notes

let edit=r.insertCell(5)

edit.innerHTML=`<button class="editBtn" onclick="editK(${i+1},'${date}','${hours}','${diesel}','${expense}','${notes}')">Edit</button>`

}

if(machine==="compressor"){

let t=document.getElementById("compressorTable")
let r=t.insertRow()

r.insertCell(0).innerText=date
r.insertCell(1).innerText=holes
r.insertCell(2).innerText=feet
r.insertCell(3).innerText=diesel
r.insertCell(4).innerText=expense
r.insertCell(5).innerText=notes

let edit=r.insertCell(6)

edit.innerHTML=`<button class="editBtn" onclick="editC(${i+1},'${date}','${holes}','${diesel}','${expense}','${notes}')">Edit</button>`

}

})

})

}

function send(data){

fetch(API,{
method:"POST",
body:JSON.stringify(data)
}).then(()=>location.reload())

}

function saveKobelco(){

send({
row:editRow,
machine:"kobelco",
date:exDate.value,
hours:exHours.value,
holes:"",
feet:"",
diesel:exDiesel.value,
expense:exExpense.value,
notes:exNotes.value
})

editRow=null

}

function saveCompressor(){

let holes=coHoles.value||0
let feet=holes*FEET_PER_HOLE

send({
row:editRow,
machine:"compressor",
date:coDate.value,
hours:"",
holes:holes,
feet:feet,
diesel:coDiesel.value,
expense:coExpense.value,
notes:coNotes.value
})

editRow=null

}

function editK(row,date,hours,diesel,expense,notes){

editRow=row
showTab("kobelco")

exDate.value=date
exHours.value=hours
exDiesel.value=diesel
exExpense.value=expense
exNotes.value=notes

}

function editC(row,date,holes,diesel,expense,notes){

editRow=row
showTab("compressor")

coDate.value=date
coHoles.value=holes
coDiesel.value=diesel
coExpense.value=expense
coNotes.value=notes

}

window.onload=loadData

</script>

</body>
</html>
