<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Machine Tracker</title>

<style>

body{
font-family:Arial;
margin:0;
background:#f4f6f9;
}

header{
background:#111;
color:white;
padding:15px;
text-align:center;
font-size:20px;
font-weight:bold;
}

.tabs{
display:flex;
}

.tabs button{
flex:1;
padding:14px;
border:none;
background:#ddd;
font-size:16px;
}

.tabs button.active{
background:#111;
color:white;
}

.container{
padding:15px;
}

.summary{
display:flex;
gap:10px;
margin-bottom:10px;
}

.summary div{
flex:1;
background:white;
padding:10px;
border-radius:8px;
text-align:center;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

.summary span{
display:block;
font-size:12px;
color:#777;
}

.summary b{
font-size:18px;
}

.card{
background:white;
padding:12px;
border-radius:8px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
margin-bottom:12px;
}

input{
width:100%;
padding:10px;
margin:6px 0;
border:1px solid #ccc;
border-radius:6px;
font-size:14px;
}

button{
width:100%;
padding:12px;
background:#111;
color:white;
border:none;
border-radius:6px;
margin-top:8px;
font-size:15px;
}

.tableWrap{
overflow-x:auto;
}

table{
width:100%;
border-collapse:collapse;
font-size:14px;
min-width:550px;
}

th{
text-align:left;
background:#fafafa;
padding:10px;
border-bottom:2px solid #eee;
}

td{
padding:10px;
border-bottom:1px solid #eee;
vertical-align:top;
}

td.note{
max-width:180px;
word-wrap:break-word;
}

.edit{
background:#007bff;
padding:6px 10px;
border:none;
color:white;
border-radius:5px;
font-size:13px;
}

</style>
</head>

<body>

<header>Machine Tracker</header>

<div class="tabs">
<button id="kTab" class="active" onclick="switchMachine('kobelco')">Kobelco</button>
<button id="cTab" onclick="switchMachine('compressor')">Compressor</button>
</div>

<div class="container">

<div class="summary">
<div><span id="l1">Hours</span><b id="s1">0</b></div>
<div><span id="l2">Diesel</span><b id="s2">0</b></div>
<div><span id="l3">Expense</span><b id="s3">0</b></div>
</div>

<div id="form"></div>

<div class="card tableWrap">
<table>
<thead>
<tr id="thead"></tr>
</thead>
<tbody id="tbody"></tbody>
</table>
</div>

</div>

<script>

const API="https://script.google.com/macros/s/AKfycbzipgS_jFRAlTHXNPhQxI8_keZy4y7QzeBgTzrRoPU43FimHoFsTLs1HW7t9BY0bzgE/exec"

let machine="kobelco"
let data=[]
let editRow=null

function formatDate(d){
if(!d) return ""
let date=new Date(d)
return date.toISOString().split("T")[0]
}

function switchMachine(m){

machine=m

document.getElementById("kTab").classList.remove("active")
document.getElementById("cTab").classList.remove("active")

if(m=="kobelco") document.getElementById("kTab").classList.add("active")
else document.getElementById("cTab").classList.add("active")

renderForm()
renderTable()

}

function renderForm(){

let html=""

if(machine=="kobelco"){

document.getElementById("l1").innerText="Hours"
document.getElementById("l2").innerText="Diesel"
document.getElementById("l3").innerText="Expense"

html=`
<div class="card">

<input type="date" id="date">
<input type="number" id="hours" placeholder="Hours">
<input type="number" id="diesel" placeholder="Diesel">
<input type="number" id="expense" placeholder="Expense">
<input type="text" id="notes" placeholder="Expense note (repair / spare part etc)">

<button onclick="save()">Add Entry</button>

</div>
`

}else{

document.getElementById("l1").innerText="Holes"
document.getElementById("l2").innerText="Diesel"
document.getElementById("l3").innerText="Expense"

html=`
<div class="card">

<input type="date" id="date">
<input type="number" id="holes" placeholder="Holes">
<input type="number" id="diesel" placeholder="Diesel">
<input type="number" id="expense" placeholder="Expense">
<input type="text" id="notes" placeholder="Expense note (repair / spare part etc)">

<button onclick="save()">Add Entry</button>

</div>
`

}

document.getElementById("form").innerHTML=html

}

function save(){

let payload={
machine:machine,
date:document.getElementById("date").value,
diesel:document.getElementById("diesel").value,
expense:document.getElementById("expense").value,
notes:document.getElementById("notes").value
}

if(machine=="kobelco")
payload.hours=document.getElementById("hours").value
else
payload.holes=document.getElementById("holes").value

if(editRow) payload.row=editRow

fetch(API,{
method:"POST",
body:JSON.stringify(payload)
})
.then(r=>r.text())
.then(()=>{
editRow=null
setTimeout(loadData,600)
})

}

function loadData(){

fetch(API)
.then(res=>res.json())
.then(json=>{
data=json
renderTable()
})

}

function renderTable(){

let rows=data.filter(x=>x.machine==machine)

let html=""

if(machine=="kobelco")
document.getElementById("thead").innerHTML="<th>Date</th><th>Hours</th><th>Diesel</th><th>Expense</th><th>Note</th><th></th>"
else
document.getElementById("thead").innerHTML="<th>Date</th><th>Holes</th><th>Diesel</th><th>Expense</th><th>Note</th><th></th>"

let t1=0,t2=0,t3=0

rows.forEach(r=>{

let date=formatDate(r.date)

if(machine=="kobelco") t1+=Number(r.hours||0)
else t1+=Number(r.holes||0)

t2+=Number(r.diesel||0)
t3+=Number(r.expense||0)

html+=`<tr>
<td>${date}</td>
<td>${machine=="kobelco"?r.hours||"":r.holes||""}</td>
<td>${r.diesel||""}</td>
<td>${r.expense||""}</td>
<td class="note">${r.notes||""}</td>
<td><button class="edit" onclick="edit(${r.row})">Edit</button></td>
</tr>`

})

document.getElementById("tbody").innerHTML=html

document.getElementById("s1").innerText=t1
document.getElementById("s2").innerText=t2
document.getElementById("s3").innerText=t3

}

function edit(row){

let r=data.find(x=>x.row==row)

editRow=row

document.getElementById("date").value=formatDate(r.date)
document.getElementById("diesel").value=r.diesel
document.getElementById("expense").value=r.expense
document.getElementById("notes").value=r.notes||""

if(machine=="kobelco")
document.getElementById("hours").value=r.hours
else
document.getElementById("holes").value=r.holes

}

renderForm()
loadData()

</script>

</body>
</html>
